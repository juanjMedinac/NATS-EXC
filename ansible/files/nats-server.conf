# nats-server.conf  — configuración base
# Referencia: https://docs.nats.io/running-a-nats-service/configuration

server_name: nats-server

# Puertos
port: 4222
http_port: 8222

# JetStream — persistencia de mensajes
jetstream {
  store_dir: "/data"
  max_memory_store: 256MB
  max_file_store:   4GB
}

# Logging
log_time: true
debug:    false
trace:    false

# Límites de conexión
max_connections: 1024
max_payload:     1MB
services:
  nats:
    image: nats:alpine
    container_name: nats-server
    restart: unless-stopped

    # Flags del servidor NATS:
    #   -n  nombre del servidor
    #   -p  puerto de clientes
    #   -m  puerto HTTP de monitoreo
    #   -js habilita JetStream (persistencia de mensajes)
    #   -sd directorio de almacenamiento de JetStream
    command: >
      -n nats-server
      -p 4222
      -m 8222
      --js
      --sd /data

    ports:
      - "4222:4222" # Clientes
      - "8222:8222" # Monitoreo HTTP  →  http://<ip>:8222
      - "6222:6222" # Clustering (útil si escala a múltiples nodos)

    volumes:
      - nats-data:/data # Persistencia de JetStream
      - ./nats-server.conf:/etc/nats/nats-server.conf:ro # Config opcional

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  nats-data:
    driver: local

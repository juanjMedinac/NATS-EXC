---
- name: Deploy NATS Server
  hosts: nats
  become: true
  gather_facts: true

  vars:
    nats_dir: /opt/nats
    compose_file: "{{ nats_dir }}/docker-compose.yml"
    nats_conf_file: "{{ nats_dir }}/nats-server.conf"

  tasks:
    # ------------------------------------------------------------------ #
    # 1. Dependencias del sistema                                          #
    # ------------------------------------------------------------------ #
    - name: Instalar paquetes base
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
        state: present
        update_cache: true

    # ------------------------------------------------------------------ #
    # 2. Instalar Docker Engine (método moderno, sin apt-key)             #
    # ------------------------------------------------------------------ #
    - name: Crear directorio para keyrings
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Descargar y guardar llave GPG de Docker
      ansible.builtin.shell:
        cmd: >
          curl -fsSL https://download.docker.com/linux/debian/gpg |
          gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: Establecer permisos de la llave GPG
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.gpg
        mode: "0644"

    - name: Agregar repositorio de Docker
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('x86_64','amd64') }}
          signed-by=/etc/apt/keyrings/docker.gpg]
          https://download.docker.com/linux/debian
          {{ ansible_distribution_release }} stable
        state: present
        filename: docker

    - name: Instalar Docker CE y Compose plugin
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: true

    - name: Habilitar y arrancar Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    # ------------------------------------------------------------------ #
    # 3. Instalar librería Python de Docker (para módulos Ansible)        #
    # ------------------------------------------------------------------ #
    - name: Instalar docker SDK para Python
      ansible.builtin.pip:
        name: docker
        state: present
        extra_args: "--break-system-packages"

    # ------------------------------------------------------------------ #
    # 4. Crear directorio de trabajo                                       #
    # ------------------------------------------------------------------ #
    - name: Crear directorio {{ nats_dir }}
      ansible.builtin.file:
        path: "{{ nats_dir }}"
        state: directory
        mode: "0750"

    # ------------------------------------------------------------------ #
    # 5. Copiar artefactos                                                 #
    # ------------------------------------------------------------------ #
    - name: Copiar docker-compose.yml
      ansible.builtin.copy:
        src: files/docker-compose.yml
        dest: "{{ compose_file }}"
        mode: "0640"
      notify: Restart NATS

    - name: Copiar nats-server.conf
      ansible.builtin.copy:
        src: files/nats-server.conf
        dest: "{{ nats_conf_file }}"
        mode: "0640"
      notify: Restart NATS

    # ------------------------------------------------------------------ #
    # 6. Levantar NATS                                                     #
    # ------------------------------------------------------------------ #
    - name: Levantar servicios con Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ nats_dir }}"
        state: present
        pull: always

    # ------------------------------------------------------------------ #
    # 7. Esperar a que NATS esté listo                                     #
    # ------------------------------------------------------------------ #
    - name: Esperar a que el puerto 4222 esté disponible
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 4222
        timeout: 30

  handlers:
    - name: Restart NATS
      community.docker.docker_compose_v2:
        project_src: "{{ nats_dir }}"
        state: present
        restarted: true
